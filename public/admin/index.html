<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoxClub — Админка</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 360px; }
    .login-box h1 { font-size: 1.3rem; margin-bottom: 1.5rem; text-align: center; }
    .login-box input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; margin-bottom: 1rem; }
    .login-box button { width: 100%; padding: 0.75rem; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    .login-box button:hover { background: #16213e; }
    .login-error { color: #e74c3c; font-size: 0.9rem; text-align: center; margin-top: 0.5rem; }
    .admin { display: none; }
    .admin.active { display: block; }
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: #1a1a2e; color: #fff; padding: 1.5rem 0; }
    .sidebar h2 { font-size: 1rem; padding: 0 1.2rem; margin-bottom: 1.5rem; opacity: 0.8; }
    .sidebar a { display: block; padding: 0.7rem 1.2rem; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.95rem; cursor: pointer; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.08); color: #fff; }
    .sidebar a i { width: 20px; margin-right: 8px; }
    .main { margin-left: 220px; padding: 2rem; }
    .section { display: none; }
    .section.active { display: block; }
    .section-header { margin-bottom: 1.5rem; }
    .section-header h2 { font-size: 1.4rem; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); padding: 1.2rem; margin-bottom: 1rem; }
    .card h3 { font-size: 1rem; margin-bottom: 0.5rem; color: #555; }
    .field { margin-bottom: 0.8rem; }
    .field label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 0.25rem; }
    .field input, .field textarea, .field select { width: 100%; padding: 0.5rem 0.7rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
    .field textarea { resize: vertical; min-height: 60px; }
    .field .checkbox-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .field .checkbox-wrap input { width: auto; }
    .array-item { background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 1rem; margin-bottom: 0.8rem; position: relative; }
    .array-item .remove-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1.1rem; }
    .add-btn { background: #eee; border: 1px dashed #ccc; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem; width: 100%; text-align: center; color: #666; }
    .add-btn:hover { background: #e5e5e5; }
    .save-bar { position: fixed; bottom: 0; left: 220px; right: 0; background: #fff; border-top: 1px solid #eee; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; z-index: 10; }
    .save-bar button { padding: 0.7rem 2rem; background: #27ae60; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    .save-bar button:hover { background: #219a52; }
    .save-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .save-status { font-size: 0.9rem; }
    .save-status.success { color: #27ae60; }
    .save-status.error { color: #e74c3c; }
    .hidden { display: none !important; }
    .loading { text-align: center; padding: 3rem; color: #888; }
    .field .image-preview { max-width: 120px; max-height: 80px; border-radius: 4px; margin-top: 0.3rem; }
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>Управление контентом</h1>
    <input type="password" id="passwordInput" placeholder="Пароль" autofocus>
    <button onclick="login()">Войти</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<div id="adminScreen" class="admin">
  <div class="sidebar">
    <h2>BoxClub CMS</h2>
    <a class="active" onclick="switchTab('training')"><i class="fas fa-dumbbell"></i> Тренировки</a>
    <a onclick="switchTab('gallery')"><i class="fas fa-images"></i> Галерея</a>
    <a onclick="switchTab('reviews')"><i class="fas fa-star"></i> Отзывы</a>
    <a onclick="switchTab('achievements')"><i class="fas fa-trophy"></i> Достижения</a>
  </div>
  <div class="main">
    <div id="section-training" class="section active"></div>
    <div id="section-gallery" class="section"></div>
    <div id="section-reviews" class="section"></div>
    <div id="section-achievements" class="section"></div>
  </div>
  <div class="save-bar">
    <button id="saveBtn" onclick="saveAll()">Сохранить всё</button>
    <span id="saveStatus" class="save-status"></span>
  </div>
</div>

<script>
const API = 'https://d5dno7rs14sms0o16i5m.nkhmighe.apigw.yandexcloud.net';
let content = {};

function login() {
  var pwd = document.getElementById('passwordInput').value;
  var err = document.getElementById('loginError');
  fetch(API + '/admin/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: pwd})
  })
  .then(function(r) {
    if (!r.ok) { err.textContent = 'Неверный пароль'; throw new Error('auth'); }
    return r.json();
  })
  .then(function() {
    sessionStorage.setItem('boxclub_pass', pwd);
    loadContent();
  })
  .catch(function(e) { if (e.message !== 'auth') err.textContent = 'Ошибка соединения'; });
}

function loadContent() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').classList.add('active');

  var pwd = sessionStorage.getItem('boxclub_pass');
  if (!pwd) return location.reload();

  var files = ['training', 'gallery', 'reviews', 'achievements'];
  var loaded = 0;
  files.forEach(function(name) {
    fetch('/content/' + name + '.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        content[name] = data;
        loaded++;
        if (loaded === files.length) renderAll();
      })
      .catch(function() {
        content[name] = {};
        loaded++;
        if (loaded === files.length) renderAll();
      });
  });
}

function renderAll() {
  renderTraining();
  renderGallery();
  renderReviews();
  renderAchievements();
}

function clear(id) { document.getElementById(id).innerHTML = ''; }

function renderTraining() {
  var el = document.getElementById('section-training');
  if (!content.training || !content.training.categories) { el.innerHTML = '<div class="loading">Нет данных</div>'; return; }
  var html = '<div class="section-header"><h2>Стоимость тренировок</h2></div>';
  content.training.categories.forEach(function(cat, ci) {
    html += '<div class="card"><h3>' + cat.title + '</h3>';
    html += '<div class="field"><label>Название</label><input value="' + esc(cat.title) + '" onchange="setTraining(' + ci + ', \'title\', this.value)"></div>';
    html += '<div class="field"><label>Иконка (FontAwesome)</label><input value="' + esc(cat.icon) + '" onchange="setTraining(' + ci + ', \'icon\', this.value)"></div>';
    cat.plans.forEach(function(plan, pi) {
      html += '<div class="array-item">';
      html += '<button class="remove-btn" onclick="removePlan(' + ci + ', ' + pi + ')"><i class="fas fa-times"></i></button>';
      html += '<div class="field"><label>Название тарифа</label><input value="' + esc(plan.title) + '" onchange="setPlan(' + ci + ', ' + pi + ', \'title\', this.value)"></div>';
      html += '<div class="field"><label>Цена</label><input value="' + esc(plan.price) + '" onchange="setPlan(' + ci + ', ' + pi + ', \'price\', this.value)"></div>';
      html += '<div class="field"><label>Цена за занятие</label><input value="' + esc(plan.perClass) + '" onchange="setPlan(' + ci + ', ' + pi + ', \'perClass\', this.value)"></div>';
      html += '<div class="field"><label>Текст кнопки</label><input value="' + esc(plan.buttonText || '') + '" onchange="setPlan(' + ci + ', ' + pi + ', \'buttonText\', this.value)"></div>';
      html += '<div class="field"><label>Текст бейджа</label><input value="' + esc(plan.badgeText || '') + '" onchange="setPlan(' + ci + ', ' + pi + ', \'badgeText\', this.value)"></div>';
      html += '<div class="field"><div class="checkbox-wrap"><input type="checkbox" ' + (plan.popular ? 'checked' : '') + ' onchange="setPlan(' + ci + ', ' + pi + ', \'popular\', this.checked)"><label>Популярный?</label></div></div>';
      html += '<div class="field"><label>Преимущества (каждое с новой строки)</label><textarea rows="3" onchange="setPlanFeatures(' + ci + ', ' + pi + ', this.value)">' + esc((plan.features || []).join('\n')) + '</textarea></div>';
      html += '</div>';
    });
    html += '<button class="add-btn" onclick="addPlan(' + ci + ')"><i class="fas fa-plus"></i> Добавить тариф</button>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function renderGallery() {
  var el = document.getElementById('section-gallery');
  if (!content.gallery || !content.gallery.items) { el.innerHTML = '<div class="loading">Нет данных</div>'; return; }
  var html = '<div class="section-header"><h2>Галерея</h2></div>';
  content.gallery.items.forEach(function(item, i) {
    html += '<div class="card array-item">';
    html += '<button class="remove-btn" onclick="removeGallery(' + i + ')"><i class="fas fa-times"></i></button>';
    html += '<div class="field"><label>Заголовок</label><input value="' + esc(item.title) + '" onchange="setGallery(' + i + ', \'title\', this.value)"></div>';
    html += '<div class="field"><label>Описание</label><textarea rows="2" onchange="setGallery(' + i + ', \'description\', this.value)">' + esc(item.description) + '</textarea></div>';
    html += '<div class="field"><label>Тип</label><select onchange="setGallery(' + i + ', \'type\', this.value)"><option value="training" ' + (item.type === 'training' ? 'selected' : '') + '>Тренировка</option><option value="competitions" ' + (item.type === 'competitions' ? 'selected' : '') + '>Соревнования</option><option value="team" ' + (item.type === 'team' ? 'selected' : '') + '>Команда</option></select></div>';
    html += '<div class="field"><label>Бейдж</label><input value="' + esc(item.badge) + '" onchange="setGallery(' + i + ', \'badge\', this.value)"></div>';
    html += '<div class="field"><label>Дата</label><input value="' + esc(item.date) + '" onchange="setGallery(' + i + ', \'date\', this.value)"></div>';
    html += '<div class="field"><div class="checkbox-wrap"><input type="checkbox" ' + (item.featured ? 'checked' : '') + ' onchange="setGallery(' + i + ', \'featured\', this.checked)"><label>Избранное?</label></div></div>';
    html += '</div>';
  });
  html += '<button class="add-btn" onclick="addGallery()"><i class="fas fa-plus"></i> Добавить фото</button>';
  el.innerHTML = html;
}

function renderReviews() {
  var el = document.getElementById('section-reviews');
  if (!content.reviews || !content.reviews.items) { el.innerHTML = '<div class="loading">Нет данных</div>'; return; }
  var html = '<div class="section-header"><h2>Отзывы</h2></div>';
  content.reviews.items.forEach(function(item, i) {
    html += '<div class="card array-item">';
    html += '<button class="remove-btn" onclick="removeReview(' + i + ')"><i class="fas fa-times"></i></button>';
    html += '<div class="field"><label>Имя</label><input value="' + esc(item.name) + '" onchange="setReview(' + i + ', \'name\', this.value)"></div>';
    html += '<div class="field"><label>Опыт</label><input value="' + esc(item.experience) + '" onchange="setReview(' + i + ', \'experience\', this.value)"></div>';
    html += '<div class="field"><label>Текст отзыва</label><textarea rows="3" onchange="setReview(' + i + ', \'text\', this.value)">' + esc(item.text) + '</textarea></div>';
    html += '<div class="field"><label>Рейтинг (1-5)</label><input type="number" min="1" max="5" value="' + item.rating + '" onchange="setReview(' + i + ', \'rating\', parseInt(this.value) || 5)"></div>';
    html += '</div>';
  });
  html += '<button class="add-btn" onclick="addReview()"><i class="fas fa-plus"></i> Добавить отзыв</button>';
  el.innerHTML = html;
}

function renderAchievements() {
  var el = document.getElementById('section-achievements');
  if (!content.achievements || !content.achievements.items) { el.innerHTML = '<div class="loading">Нет данных</div>'; return; }
  var html = '<div class="section-header"><h2>Достижения</h2></div>';
  content.achievements.items.forEach(function(item, i) {
    html += '<div class="card array-item">';
    html += '<button class="remove-btn" onclick="removeAchievement(' + i + ')"><i class="fas fa-times"></i></button>';
    html += '<div class="field"><label>Название</label><input value="' + esc(item.title) + '" onchange="setAchievement(' + i + ', \'title\', this.value)"></div>';
    html += '<div class="field"><label>CSS-класс</label><input value="' + esc(item.positionClass) + '" onchange="setAchievement(' + i + ', \'positionClass\', this.value)"></div>';
    html += '</div>';
  });
  html += '<button class="add-btn" onclick="addAchievement()"><i class="fas fa-plus"></i> Добавить достижение</button>';
  el.innerHTML = html;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'&#10;'); }

function setTraining(ci, key, val) { content.training.categories[ci][key] = val; }
function setPlan(ci, pi, key, val) { content.training.categories[ci].plans[pi][key] = val; }
function setPlanFeatures(ci, pi, val) { content.training.categories[ci].plans[pi].features = val.split('\n').filter(Boolean); }
function setGallery(i, key, val) { content.gallery.items[i][key] = val; }
function setReview(i, key, val) { content.reviews.items[i][key] = val; }
function setAchievement(i, key, val) { content.achievements.items[i][key] = val; }

function addPlan(ci) {
  content.training.categories[ci].plans.push({id: 'new-' + Date.now(), title: '', price: '', perClass: '', popular: false, features: []});
  renderTraining();
}
function removePlan(ci, pi) {
  content.training.categories[ci].plans.splice(pi, 1);
  renderTraining();
}
function addGallery() { content.gallery.items.push({id: Date.now(), image: '', title: '', description: '', type: 'training', badge: '', date: '', featured: false}); renderGallery(); }
function removeGallery(i) { content.gallery.items.splice(i, 1); renderGallery(); }
function addReview() { content.reviews.items.push({id: Date.now(), name: '', experience: '', text: '', rating: 5}); renderReviews(); }
function removeReview(i) { content.reviews.items.splice(i, 1); renderReviews(); }
function addAchievement() { content.achievements.items.push({image: '', title: '', positionClass: ''}); renderAchievements(); }
function removeAchievement(i) { content.achievements.items.splice(i, 1); renderAchievements(); }

function switchTab(name) {
  document.querySelectorAll('.section, .sidebar a').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('section-' + name).classList.add('active');
  document.querySelector('.sidebar a[onclick*="' + name + '"]').classList.add('active');
}

function saveAll() {
  var btn = document.getElementById('saveBtn');
  var status = document.getElementById('saveStatus');
  btn.disabled = true;
  status.className = 'save-status';
  status.textContent = 'Сохранение...';

  var pwd = sessionStorage.getItem('boxclub_pass');
  if (!pwd) { status.className = 'save-status error'; status.textContent = 'Сессия истекла, перезагрузите страницу'; btn.disabled = false; return; }

  var files = [
    {path: 'public/content/training.json', content: JSON.stringify(content.training, null, 2)},
    {path: 'public/content/gallery.json', content: JSON.stringify(content.gallery, null, 2)},
    {path: 'public/content/reviews.json', content: JSON.stringify(content.reviews, null, 2)},
    {path: 'public/content/achievements.json', content: JSON.stringify(content.achievements, null, 2)},
  ];

  fetch(API + '/admin/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: pwd, files: files})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      status.className = 'save-status success';
      status.textContent = 'Сохранено! GitHub Actions деплоит...';
    } else {
      status.className = 'save-status error';
      status.textContent = 'Ошибка: ' + (data.error || 'неизвестная');
    }
  })
  .catch(function() {
    status.className = 'save-status error';
    status.textContent = 'Ошибка соединения';
  })
  .finally(function() { btn.disabled = false; });
}

document.getElementById('passwordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

if (sessionStorage.getItem('boxclub_pass')) loadContent();
</script>
</body>
</html>
