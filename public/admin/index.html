<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoxClub — Админка</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>Управление контентом</h1>
    <input type="password" id="passwordInput" placeholder="Пароль" autofocus>
    <button onclick="login()">Войти</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<div id="adminScreen" class="admin">
  <div class="sidebar">
    <h2>BoxClub CMS</h2>
    <a class="active" onclick="switchTab('training')"><i class="fas fa-dumbbell"></i> Тренировки</a>
    <a onclick="switchTab('gallery')"><i class="fas fa-images"></i> Галерея</a>
    <a onclick="switchTab('reviews')"><i class="fas fa-star"></i> Отзывы</a>
    <a onclick="switchTab('achievements')"><i class="fas fa-trophy"></i> Достижения</a>
    <a onclick="switchTab('site')"><i class="fas fa-pen"></i> О школе</a>
    <a onclick="switchTab('contact')"><i class="fas fa-address-card"></i> Контакты</a>
    <a onclick="logout()" style="margin-top:auto;border-top:1px solid rgba(255,255,255,0.1);padding-top:0.7rem;"><i class="fas fa-sign-out-alt"></i> Выйти</a>
  </div>
  <div class="main">
    <div id="section-training" class="section active"></div>
    <div id="section-gallery" class="section"></div>
    <div id="section-reviews" class="section"></div>
    <div id="section-achievements" class="section"></div>
    <div id="section-site" class="section"></div>
    <div id="section-contact" class="section"></div>
  </div>
  <div class="save-bar">
    <button id="saveBtn" onclick="saveAll()">Сохранить всё</button>
    <span id="saveStatus" class="save-status"></span>
  </div>
</div>

<div id="iconModal" class="icon-modal-overlay">
  <div class="icon-modal">
    <button class="icon-modal-close" onclick="closeIconPicker()">&times;</button>
    <h3>Выберите иконку</h3>
    <div id="iconModalGrid" class="icon-picker"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
